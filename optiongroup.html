<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Here the representation of option group tag</h1>
    <select>
    <optgroup label="Fruits">
        <option>Apple</option>
        <option>Mango</option>
    </optgroup>

    <optgroup label="Vegetables">
        <option>Carrot</option>
        <option>Potato</option>
    </optgroup>
    </select>
</body>
</html>
